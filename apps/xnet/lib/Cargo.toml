[package]
name = "xnet-lib"
edition = "2024"
license.workspace = true
version.workspace = true
description = "test orchestrator for xmtpd"

[lib]
path = "src/lib.rs"

[features]
default = []

[dependencies]
alloy = { workspace = true, features = [
  "signer-local",
  "provider-http",
  "network",
  "rpc-types-eth",
  "provider-anvil-api",
  "sol-types",
  "contract",
] }
ascii_table = { version = "5", features = ["auto_table_width"] }
async-trait = "0.1"
bollard = "0.20"
bollard-stubs = "1.52.0-rc.29.1.3"
bon = "3.8"
chrono.workspace = true
clap.workspace = true
clap-verbosity-flag.workspace = true
color-eyre.workspace = true
dotenvy = "0.15"
futures.workspace = true
humantime = "2.3"
itertools.workspace = true
map-macro = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = "0.9"
tokio.workspace = true
toml = "0.9.11"
toxiproxy_rust = { workspace = true }
tracing.workspace = true
tracing-subscriber.workspace = true
url = "2"
xmtp_api_d14n.workspace = true
xmtp_api_grpc.workspace = true
xmtp_common.workspace = true
xmtp_proto.workspace = true

[build-dependencies]
vergen-gix = { workspace = true, features = ["build"] }

[lints]
workspace = true
