# Default configuration is uncommented
# Commented configuration is an example
[xnet]
use_standard_ports = true
paused = false
enable_v3 = true
enable_d14n = true
enable_monitoring = true

[traefik]
image = "traefik"
version = "v3.2"
port = 80
https_port = 443

[toxiproxy]
image = "ghcr.io/shopify/toxiproxy"
version = "2.12.0"
port = 8474

[migration]
enable = false
migration_timestamp = 2_147_483_647

[xmtpd]
image = "ghcr.io/xmtp/xmtpd"
version = "sha-f72e436"

[v3]
image = "ghcr.io/xmtp/node-go"
version = "main"
port = 5556

[gateway]
image = "ghcr.io/xmtp/xmtpd-gateway"
version = "sha-f72e436"

[validation]
image = "ghcr.io/xmtp/mls-validation-service"
version = "main"

[contracts]
image = "ghcr.io/xmtp/contracts"
version = "main"

[history]
image = "ghcr.io/xmtp/message-history-server"
version = "main"

[prometheus]
image = "prom/prometheus"
version = "latest"

[grafana]
image = "ghcr.io/xmtp/grafana-xmtpd"
version = "latest"

