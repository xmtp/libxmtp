[package]
name = "xdbg"
description = "Debug and Inspection Tool for the XMTP Network"
license.workspace = true
version.workspace = true
rust-version.workspace = true
edition.workspace = true
publish.workspace = true

[lints]
workspace = true

[build-dependencies]
vergen-gix = { workspace = true, features = ["build"] }

[dependencies]
alloy-primitives.workspace = true
alloy-signer-local.workspace = true
async-trait.workspace = true
bitflags = "2"
chrono.workspace = true
clap.workspace = true
clap-verbosity-flag = { version = "3.0", features = ["tracing"] }
color-eyre.workspace = true
const_format.workspace = true
csv = "1.4"
directories = "6.0"
ecdsa = "0.16"
fdlimit.workspace = true
fs_extra = "1.3"
futures.workspace = true
hex.workspace = true
humantime = "2.3"
indicatif.workspace = true
inventory = "0.3"
itertools.workspace = true
k256 = "0.13"
lipsum = "0.9"
num_cpus = "1.16.0"
openmls.workspace = true
openmls_rust_crypto.workspace = true
owo-colors.workspace = true
prometheus = "0.14"
prost.workspace = true
rand.workspace = true
redb = { version = "4.1", features = ["logging"] }
reqwest.workspace = true
serde.workspace = true
serde_json.workspace = true
speedy = "0.8"
tempfile = "3.15"
thiserror.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread"] }
tokio-stream.workspace = true
tracing = { workspace = true, features = ["valuable"] }
tracing-appender.workspace = true
tracing-error = "0.2"
tracing-log = "0.2"
tracing-logfmt.workspace = true
tracing-subscriber = { workspace = true, features = [
  "time",
  "json",
  "chrono",
  "env-filter",
  "valuable",
  "ansi",
  "tracing-log",
] }
url.workspace = true
valuable = { version = "0.1", features = ["derive"] }
xmtp_api_d14n.workspace = true
xmtp_api_grpc.workspace = true
xmtp_common = { workspace = true }
xmtp_configuration.workspace = true
xmtp_cryptography = { workspace = true, features = ["exposed-keys"] }
xmtp_db.workspace = true
xmtp_id.workspace = true
xmtp_logging.workspace = true
xmtp_mls.workspace = true
xmtp_mls_common.workspace = true
xmtp_proto.workspace = true
xxhash-rust = { version = "0.8", features = ["xxh3"] }

[features]
default = ["deserialize-paths"]
# Forward bincode field-path debug to xmtp_db. Runtime-gated on `openmls_kv` target enabled.
deserialize-paths = ["xmtp_db/deserialize-paths"]
