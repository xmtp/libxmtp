[package]
name = "xmtp_macro_builder"
edition = "2024"
license.workspace = true
version.workspace = true
description = "XMTP Builder Pattern Macros"

[lints]
workspace = true

[dependencies]
proc-macro2.workspace = true
quote.workspace = true
syn = { workspace = true, default-features = false, features = [
  "parsing",
  "proc-macro",
  "derive",
  "printing",
  "full",
  "clone-impls",
] }
xmtp-workspace-hack = { version = "0.1", path = "../xmtp-workspace-hack" }

[lib]
proc-macro = true
