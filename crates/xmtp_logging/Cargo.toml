[package]
name = "xmtp_logging"
description = "Logging and tracing pipeline construction for libxmtp"
license.workspace = true
version.workspace = true
rust-version.workspace = true
edition.workspace = true
publish.workspace = true

[dependencies]
parking_lot.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber = { workspace = true, features = [
  "fmt",
  "env-filter",
  "ansi",
  "json",
  "registry",
] }
xmtp-workspace-hack.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
opentelemetry.workspace = true
opentelemetry_sdk.workspace = true
opentelemetry-otlp.workspace = true
tracing-opentelemetry.workspace = true
tracing-appender.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
tracing-web.workspace = true
# test-utils only: readable panics in wasm test output.
console_error_panic_hook = { workspace = true, optional = true }

[target.'cfg(target_os = "android")'.dependencies]
paranoid-android = "0.2"
tracing_android_trace = "0.1"

[target.'cfg(target_os = "ios")'.dependencies]
tracing-oslog = "0.3"

[features]
# The test subscriber installed by `#[xmtp_common::test]`. On wasm this pulls in
# `console_error_panic_hook` for readable panic output; on native it only needs
# `tracing-subscriber`, which is already a non-optional dependency.
test-utils = ["dep:console_error_panic_hook"]
