[package]
name = "xmtp_common"
description = "common utilities"
license.workspace = true
version.workspace = true
rust-version.workspace = true
edition.workspace = true
publish.workspace = true

[dependencies]
async-trait.workspace = true
const_panic.workspace = true
futures = { workspace = true, features = ["std"] }
hex.workspace = true
rand.workspace = true
thiserror.workspace = true
tokio.workspace = true
tracing.workspace = true
web-time.workspace = true

# optional/test-utils/dev-deps. tracing-subscriber survives here only for the
# bench subscriber + the `traced_test` test helper; all production logging now
# lives in xmtp_logging.
parking_lot = { workspace = true, optional = true }
toxiproxy_rust = { workspace = true, optional = true }
tracing-flame = { version = "0.2", optional = true }
tracing-subscriber = { workspace = true, features = [
  "fmt",
  "env-filter",
  "ansi",
  "json",
], optional = true }
wasm-bindgen-test = { workspace = true, optional = true }
xmtp-workspace-hack.workspace = true
xmtp_cryptography.workspace = true
# Test subscriber lives in xmtp_logging now; `logger()` delegates to it. This is
# a dev/test-only edge: xmtp_logging's production code does not depend on
# xmtp_common, so there is no normal-build cycle.
xmtp_logging = { workspace = true, features = ["test-utils"], optional = true }
xmtp_macro.workspace = true

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { workspace = true, features = ["wasm_js"] }
gloo-timers = { workspace = true, features = ["futures"] }
js-sys.workspace = true
web-sys = { workspace = true, features = ["Window"] }
wasm-bindgen-futures.workspace = true
wasm-bindgen.workspace = true
tokio_with_wasm = { version = "0.9.0", features = ["full"] }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio-stream = { workspace = true, features = ["time"] }
fdlimit.workspace = true
ctor.workspace = true

[dev-dependencies]
parking_lot.workspace = true
thiserror.workspace = true
toxiproxy_rust.workspace = true
tracing-subscriber = { workspace = true, features = [
  "fmt",
  "env-filter",
  "ansi",
  "json",
] }
xmtp_common = { workspace = true, features = ["test-utils"] }
xmtp_cryptography = { workspace = true, features = ["test-utils"] }


[target.'cfg(target_arch = "wasm32")'.dev-dependencies]
tokio = { workspace = true }
wasm-bindgen-test.workspace = true

[target.'cfg(not(target_arch = "wasm32"))'.dev-dependencies]
tokio = { workspace = true, features = [
  "rt-multi-thread",
  "macros",
  "test-util",
] }
ctor.workspace = true
parking_lot.workspace = true

[features]
# All production logging/telemetry now lives in xmtp_logging. The remaining
# tracing-subscriber usage here is test/bench-only (traced_test helper + bench
# subscriber), so it is pulled in by test-utils/bench rather than a `logging`
# feature.
test-utils = [
  "dep:parking_lot",
  "dep:tracing-subscriber",
  "dep:wasm-bindgen-test",
  "dep:toxiproxy_rust",
  # the test subscriber `logger()` delegates to, now owned by xmtp_logging
  "dep:xmtp_logging",
  "xmtp_cryptography/test-utils",
]
bench = ["test-utils", "dep:tracing-subscriber", "dep:tracing-flame"]

[lints]
workspace = true
