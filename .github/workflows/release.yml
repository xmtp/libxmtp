name: Release

on:
  workflow_dispatch:
    inputs:
      release-type:
        description: "Release type"
        required: true
        type: choice
        options:
          - "dev"
          - "rc"
          - "final"
      ref:
        description: "Branch to release from (defaults to the branch the workflow is run from)"
        required: false
        type: string
      rc-number:
        description: "RC number (required for RC releases)"
        required: false
        type: number
      ios:
        description: "Release iOS SDK"
        required: false
        type: boolean
        default: false
      android:
        description: "Release Android SDK"
        required: false
        type: boolean
        default: false
      node:
        description: "Release Node Bindings"
        required: false
        type: boolean
        default: false
      wasm:
        description: "Release WASM Bindings"
        required: false
        type: boolean
        default: false
      no-merge:
        description: "Skip merging the release PR to main (only applies to final releases)"
        required: false
        type: boolean
        default: false
  schedule:
    # Nightly: 06:00 UTC daily (~11pm PT / 02am ET). Schedule-only, never manual.
    - cron: "0 6 * * *"

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      release-type: ${{ steps.resolve.outputs.release-type }}
      ref: ${{ steps.resolve.outputs.ref }}
      ios: ${{ steps.resolve.outputs.ios }}
      android: ${{ steps.resolve.outputs.android }}
      node: ${{ steps.resolve.outputs.node }}
      wasm: ${{ steps.resolve.outputs.wasm }}
      skip: ${{ steps.skip-check.outputs.skip }}
    steps:
      - name: Resolve release parameters
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_RELEASE_TYPE: ${{ inputs.release-type }}
          INPUT_REF: ${{ inputs.ref }}
          GITHUB_REF: ${{ github.ref }}
          INPUT_IOS: ${{ inputs.ios }}
          INPUT_ANDROID: ${{ inputs.android }}
          INPUT_NODE: ${{ inputs.node }}
          INPUT_WASM: ${{ inputs.wasm }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ]; then
            echo "release-type=nightly" >> "$GITHUB_OUTPUT"
            echo "ref=main" >> "$GITHUB_OUTPUT"
            echo "ios=true" >> "$GITHUB_OUTPUT"
            echo "android=true" >> "$GITHUB_OUTPUT"
            echo "node=true" >> "$GITHUB_OUTPUT"
            echo "wasm=true" >> "$GITHUB_OUTPUT"
          else
            echo "release-type=$INPUT_RELEASE_TYPE" >> "$GITHUB_OUTPUT"
            echo "ref=${INPUT_REF:-$GITHUB_REF}" >> "$GITHUB_OUTPUT"
            echo "ios=$INPUT_IOS" >> "$GITHUB_OUTPUT"
            echo "android=$INPUT_ANDROID" >> "$GITHUB_OUTPUT"
            echo "node=$INPUT_NODE" >> "$GITHUB_OUTPUT"
            echo "wasm=$INPUT_WASM" >> "$GITHUB_OUTPUT"
          fi
      - name: Validate dev release
        if: steps.resolve.outputs.release-type == 'dev'
        env:
          RC_NUMBER: ${{ inputs.rc-number }}
        run: |
          if [ -n "$RC_NUMBER" ]; then
            echo "::error::Dev releases should not have an RC number set"
            exit 1
          fi
      - name: Validate release branch
        if: steps.resolve.outputs.release-type == 'rc' || steps.resolve.outputs.release-type == 'final'
        env:
          REF: ${{ steps.resolve.outputs.ref }}
        run: |
          BRANCH="${REF#refs/heads/}"
          if [[ ! "$BRANCH" =~ ^release/ ]]; then
            echo "::error::RC and final releases must be run from a release/* branch, got: $BRANCH"
            exit 1
          fi
      - name: Validate RC number
        if: steps.resolve.outputs.release-type == 'rc'
        env:
          RC_NUMBER: ${{ inputs.rc-number }}
        run: |
          if [ -z "$RC_NUMBER" ] || [ "$RC_NUMBER" -lt 1 ]; then
            echo "::error::RC releases require rc-number to be set to a value greater than 0"
            exit 1
          fi
      - name: Skip-if-no-new-commits (nightly only)
        id: skip-check
        if: steps.resolve.outputs.release-type == 'nightly'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF: ${{ steps.resolve.outputs.ref }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          HEAD_SHA=$(gh api "repos/${REPO}/commits/${REF}" --jq '.sha[0:7]')
          LAST_TAG=$(gh api "repos/${REPO}/git/matching-refs/tags/ios-" \
            --jq '[.[] | .ref | sub("refs/tags/"; "")] | map(select(test("-nightly\\."))) | sort | last // ""')
          if [ -n "$LAST_TAG" ]; then
            LAST_SHA=$(echo "$LAST_TAG" | grep -oE '[0-9a-f]{7}$' || true)
            if [ "$LAST_SHA" = "$HEAD_SHA" ]; then
              echo "::notice::No new commits since last nightly ($LAST_TAG); skipping."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

  # Nightly blocking relies on TWO mechanisms that must BOTH be preserved (see hub job below):
  #  1. gate-skip == 'true' (a legitimate "not green yet" skip; gate job succeeds), and
  #  2. job-dependency skip on gate/pending FAILURE.
  gate:
    needs: [validate]
    if: needs.validate.outputs.release-type == 'nightly' && needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.sha.outputs.sha }}
      gate-skip: ${{ steps.gate.outputs.gate-skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.ref }}
          fetch-depth: 1
      - uses: ./.github/actions/setup-release-tools
      - name: Resolve exact SHA
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ needs.validate.outputs.ref }}
          # github.sha is the exact commit this run was triggered on (and the one
          # checked out above). For schedule/dispatch on main this is the nightly
          # target — using it avoids a TOCTOU race where a concurrent push moves
          # the branch HEAD between resolving the SHA and querying cross-test.
          EVENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${EVENT_SHA:-}" ]; then
            SHA="$EVENT_SHA"
          else
            SHA=$(gh api "repos/${REPO}/commits/${REF}" --jq '.sha')
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - name: Evaluate cross-test gate
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -euo pipefail
          gh api "repos/${REPO}/actions/workflows/cross-test.yml/runs?head_sha=${SHA}&status=completed" > /tmp/cross-runs.json
          RESULT=$(xmtp-release cross-test-gate --input=/tmp/cross-runs.json --sha "$SHA")
          PASS=$(printf '%s' "$RESULT" | jq -r '.pass')
          if [ "$PASS" = "true" ]; then
            echo "gate-skip=false" >> "$GITHUB_OUTPUT"
            echo "::notice::cross-test green for ${SHA}; nightly may proceed."
          else
            REASON=$(printf '%s' "$RESULT" | jq -r '.reason')
            echo "gate-skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Nightly skipped — ${REASON}"
          fi

  pending:
    needs: [validate, gate]
    if: needs.validate.outputs.release-type == 'nightly' && needs.gate.outputs.gate-skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pending.outputs.version }}
      kind: ${{ steps.pending.outputs.kind }}
      # 'true' when there are no conventional commits since the last tag — a
      # legitimate "nothing to release" nightly that downstream jobs skip.
      nothing-pending: ${{ steps.pending.outputs.nothing-pending }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-release-tools
      - name: Install git-cliff
        run: |
          set -euo pipefail
          cargo binstall -y git-cliff || cargo install git-cliff
          # Fail loudly if neither install path produced a working binary, so a
          # broken install can't fall through to an empty pending version.
          git cliff --version
      - name: Compute pending libxmtp release (git-cliff oracle)
        id: pending
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          LAST=$(gh api "repos/${REPO}/git/matching-refs/tags/v" \
            --jq '[.[].ref | sub("refs/tags/v";"")]
                  | map(select(test("^[0-9]+\\.[0-9]+\\.[0-9]+$")))
                  | sort_by(split(".")|map(tonumber)) | last // ""')
          # Fail loudly if no stable libxmtp tag exists rather than silently
          # diffing against a stale hardcoded baseline.
          if [ -z "$LAST" ]; then
            echo "::error::No stable v* libxmtp tag found to use as the bump baseline"
            exit 1
          fi
          git cliff --config cliff.toml --bump --context > /tmp/cliff-context.json
          # Default (no --require): emits {version:null,kind:null} on exit 0 when
          # there are no conventional commits since the last tag — a legitimate
          # no-op nightly we skip rather than fail.
          PENDING=$(xmtp-release pending-version --input=/tmp/cliff-context.json --last-shipped "$LAST")
          VERSION=$(printf '%s' "$PENDING" | jq -r '.version')
          KIND=$(printf '%s' "$PENDING" | jq -r '.kind')
          if [ "$VERSION" = "null" ] && [ "$KIND" = "null" ]; then
            echo "nothing-pending=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No conventional commits since the last tag; skipping nightly (nothing to release)."
            exit 0
          fi
          # Anything else empty/null is unexpected corruption, not a clean no-op.
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ] || [ -z "$KIND" ] || [ "$KIND" = "null" ]; then
            echo "::error::pending-version produced malformed version/kind: '$PENDING'"
            exit 1
          fi
          echo "nothing-pending=false" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "kind=$KIND" >> "$GITHUB_OUTPUT"

  release-ios:
    needs: [validate, gate, pending]
    if: >-
      !cancelled() && !contains(needs.*.result, 'failure')
      && needs.validate.outputs.ios == 'true' && needs.validate.outputs.skip != 'true'
      && (needs.validate.outputs.release-type != 'nightly'
          || (needs.gate.outputs.gate-skip != 'true' && needs.pending.outputs.nothing-pending != 'true'))
    uses: ./.github/workflows/release-ios.yml
    with:
      release-type: ${{ needs.validate.outputs.release-type }}
      rc-number: ${{ inputs.rc-number }}
      ref: ${{ needs.validate.outputs.ref }}
      pending-version: ${{ needs.pending.outputs.version }}
      pending-kind: ${{ needs.pending.outputs.kind }}
    secrets: inherit

  release-android:
    needs: [validate, gate, pending]
    if: >-
      !cancelled() && !contains(needs.*.result, 'failure')
      && needs.validate.outputs.android == 'true' && needs.validate.outputs.skip != 'true'
      && (needs.validate.outputs.release-type != 'nightly'
          || (needs.gate.outputs.gate-skip != 'true' && needs.pending.outputs.nothing-pending != 'true'))
    uses: ./.github/workflows/release-android.yml
    with:
      release-type: ${{ needs.validate.outputs.release-type }}
      rc-number: ${{ inputs.rc-number }}
      ref: ${{ needs.validate.outputs.ref }}
      pending-version: ${{ needs.pending.outputs.version }}
      pending-kind: ${{ needs.pending.outputs.kind }}
    secrets: inherit

  release-node:
    needs: [validate, gate, pending]
    if: >-
      !cancelled() && !contains(needs.*.result, 'failure')
      && needs.validate.outputs.node == 'true' && needs.validate.outputs.skip != 'true'
      && (needs.validate.outputs.release-type != 'nightly'
          || (needs.gate.outputs.gate-skip != 'true' && needs.pending.outputs.nothing-pending != 'true'))
    uses: ./.github/workflows/release-node.yml
    with:
      release-type: ${{ needs.validate.outputs.release-type }}
      rc-number: ${{ inputs.rc-number }}
      ref: ${{ needs.validate.outputs.ref }}
      pending-version: ${{ needs.pending.outputs.version }}
      pending-kind: ${{ needs.pending.outputs.kind }}
    secrets: inherit

  release-wasm:
    needs: [validate, gate, pending]
    if: >-
      !cancelled() && !contains(needs.*.result, 'failure')
      && needs.validate.outputs.wasm == 'true' && needs.validate.outputs.skip != 'true'
      && (needs.validate.outputs.release-type != 'nightly'
          || (needs.gate.outputs.gate-skip != 'true' && needs.pending.outputs.nothing-pending != 'true'))
    uses: ./.github/workflows/release-wasm.yml
    with:
      release-type: ${{ needs.validate.outputs.release-type }}
      rc-number: ${{ inputs.rc-number }}
      ref: ${{ needs.validate.outputs.ref }}
      pending-version: ${{ needs.pending.outputs.version }}
      pending-kind: ${{ needs.pending.outputs.kind }}
    secrets: inherit

  merge-pr:
    if: needs.validate.outputs.release-type == 'final' && !inputs.no-merge && !cancelled() && !contains(needs.*.result, 'failure')
    needs: [validate, release-ios, release-android, release-node, release-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Merge release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BRANCH: ${{ needs.validate.outputs.ref }}
        run: |
          BRANCH="${RELEASE_BRANCH#refs/heads/}"
          PR_NUMBER=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for branch $BRANCH targeting main"
            exit 1
          fi
          gh pr merge "$PR_NUMBER" --merge --delete-branch

  # Nightly blocking + non-nightly compatibility rely on the `if` pattern shared
  # by the release-* jobs and this hub job:
  #   !cancelled() && !contains(needs.*.result, 'failure') && <type/gate clauses>
  # Why each piece matters:
  #  - `!cancelled()` forces the `if` to be EVALUATED even when a `needs` job was
  #    SKIPPED. Without it, gate/pending being skipped for dev/rc/final auto-skips
  #    every release-* job (GitHub's implicit success() on needs) — which silently
  #    breaks all non-nightly releases.
  #  - `!contains(needs.*.result, 'failure')` still blocks when a needs job (e.g. a
  #    nightly gate error) FAILED — fail-closed for nightlies.
  #  - the `gate-skip != 'true'` clause blocks a nightly when cross-test isn't green.
  # Do NOT drop any of the three; they jointly make non-nightly run and nightly
  # block-on-not-green / block-on-error.
  hub:
    needs: [validate, gate, pending, release-ios, release-android, release-node, release-wasm]
    if: >-
      needs.validate.outputs.release-type == 'nightly'
      && needs.gate.outputs.gate-skip != 'true'
      && needs.pending.outputs.nothing-pending != 'true'
      && !cancelled() && !contains(needs.*.result, 'failure')
    # Serialize hub runs for the same pending version so two overlapping nightly
    # runs (e.g. cron + a manual dispatch) can't both create the same tag/release
    # and race on `gh release create`. Scoped to the pending version (resolved by
    # the `pending` job); cancel-in-progress: false so a second run waits rather
    # than clobbering an in-flight tag/release.
    concurrency:
      group: hub-release-${{ needs.pending.outputs.version }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-release-tools
      # Don't mint an empty hub release. A manual nightly dispatch can disable
      # every SDK (ios=android=node=wasm=false), which would otherwise produce a
      # libxmtp Release with an all-"—" rollup. Require at least one SDK to have
      # shipped a version. (The cron path always enables all four, so this only
      # guards manual dispatch.)
      - name: Guard against empty rollup
        id: guard
        env:
          IOS_VERSION: ${{ needs.release-ios.outputs.version }}
          ANDROID_VERSION: ${{ needs.release-android.outputs.version }}
          NODE_VERSION: ${{ needs.release-node.outputs.version }}
          WASM_VERSION: ${{ needs.release-wasm.outputs.version }}
        run: |
          set -euo pipefail
          if [ -z "${IOS_VERSION}${ANDROID_VERSION}${NODE_VERSION}${WASM_VERSION}" ]; then
            echo "should-release=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No SDK shipped a version; skipping the empty hub release."
          else
            echo "should-release=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Compute libxmtp hub version
        id: hubver
        if: steps.guard.outputs.should-release == 'true'
        run: |
          set -euo pipefail
          VERSION=$(xmtp-release resolve-sdk-version \
            --sdk libxmtp --release-type nightly \
            --pending-version "${{ needs.pending.outputs.version }}" \
            --pending-kind "${{ needs.pending.outputs.kind }}")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Tag libxmtp hub
        if: steps.guard.outputs.should-release == 'true'
        run: xmtp-release tag-release --sdk libxmtp --version "${{ steps.hubver.outputs.version }}" --ignore-if-exists
      - name: Create hub GitHub Release
        if: steps.guard.outputs.should-release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HUB_VERSION: ${{ steps.hubver.outputs.version }}
          IOS_VERSION: ${{ needs.release-ios.outputs.version }}
          ANDROID_VERSION: ${{ needs.release-android.outputs.version }}
          NODE_VERSION: ${{ needs.release-node.outputs.version }}
          WASM_VERSION: ${{ needs.release-wasm.outputs.version }}
        run: |
          set -euo pipefail
          BODY=$(cat <<EOF
          ## libxmtp ${HUB_VERSION}

          Nightly release. SDKs shipped from this libxmtp release:

          | SDK | Version |
          | --- | --- |
          | iOS | ${IOS_VERSION:-—} |
          | Android | ${ANDROID_VERSION:-—} |
          | Node | ${NODE_VERSION:-—} |
          | WASM | ${WASM_VERSION:-—} |

          See per-SDK release notes under \`docs/release-notes/\`.
          EOF
          )
          if gh release view "v${HUB_VERSION}" >/dev/null 2>&1; then
            gh release edit "v${HUB_VERSION}" \
              --title "libxmtp ${HUB_VERSION}" \
              --notes "$BODY" \
              --prerelease
          else
            gh release create "v${HUB_VERSION}" \
              --title "libxmtp ${HUB_VERSION}" \
              --notes "$BODY" \
              --prerelease
          fi

  notify:
    needs: [validate, gate, pending, hub, release-ios, release-android, release-node, release-wasm, merge-pr]
    if: always() && needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - id: compute
        env:
          IOS_RESULT: ${{ needs.release-ios.result }}
          IOS_VERSION: ${{ needs.release-ios.outputs.version }}
          ANDROID_RESULT: ${{ needs.release-android.result }}
          ANDROID_VERSION: ${{ needs.release-android.outputs.version }}
          NODE_RESULT: ${{ needs.release-node.result }}
          NODE_VERSION: ${{ needs.release-node.outputs.version }}
          WASM_RESULT: ${{ needs.release-wasm.result }}
          WASM_VERSION: ${{ needs.release-wasm.outputs.version }}
          RELEASE_TYPE: ${{ needs.validate.outputs.release-type }}
        run: |
          MSG="${RELEASE_TYPE^} Release:"
          if [ -n "$IOS_VERSION" ] || [ "$IOS_RESULT" != "skipped" ]; then
            MSG="$MSG iOS ${IOS_VERSION:-failed} (${IOS_RESULT})"
          fi
          if [ -n "$ANDROID_VERSION" ] || [ "$ANDROID_RESULT" != "skipped" ]; then
            MSG="$MSG Android ${ANDROID_VERSION:-failed} (${ANDROID_RESULT})"
          fi
          if [ -n "$NODE_VERSION" ] || [ "$NODE_RESULT" != "skipped" ]; then
            MSG="$MSG Node ${NODE_VERSION:-failed} (${NODE_RESULT})"
          fi
          if [ -n "$WASM_VERSION" ] || [ "$WASM_RESULT" != "skipped" ]; then
            MSG="$MSG WASM ${WASM_VERSION:-failed} (${WASM_RESULT})"
          fi
          echo "message=$MSG" >> "$GITHUB_OUTPUT"
      - uses: ./.github/actions/slack-notify
        with:
          message: ${{ steps.compute.outputs.message }}
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
