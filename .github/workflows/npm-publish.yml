name: NPM Publish

on:
  workflow_call:
    inputs:
      package-dir:
        description: 'Path to the npm package directory'
        required: true
        type: string
      install-dir:
        description: 'Directory to run `yarn` install from. For a Yarn workspace member this is the workspace root, not the package dir. Defaults to package-dir.'
        required: false
        type: string
        default: ''
      lockfile-path:
        description: 'Path to the yarn.lock used for dependency caching. For a Yarn workspace member this is the workspace-root lockfile. Defaults to <package-dir>/yarn.lock.'
        required: false
        type: string
        default: ''
      sdk:
        description: 'SDK name for release tools (e.g. node-bindings, wasm-bindings)'
        required: true
        type: string
      version:
        description: 'The version to publish'
        required: true
        type: string
      artifact-pattern:
        description: 'Pattern for downloading build artifacts (optional)'
        required: false
        type: string
      artifact-path:
        description: 'Path to download artifacts to (required if artifact-pattern is set)'
        required: false
        type: string
      ignore-scripts:
        description: 'Skip npm lifecycle scripts during publish (e.g. prepublishOnly)'
        required: false
        type: boolean
        default: false
      dep-name:
        description: 'Dependency name to pin before publish (e.g. @xmtp/node-bindings)'
        required: false
        type: string
        default: ''
      dep-version:
        description: 'Exact version to pin the dependency to (e.g. 1.2.3-nightly.20260604.abc1234)'
        required: false
        type: string
        default: ''
      dry-run:
        description: 'When true, run all steps EXCEPT the npm publish and tag (no side effects)'
        required: false
        type: boolean
        default: false
    outputs:
      version:
        description: "The published version"
        value: ${{ jobs.publish.outputs.version }}

jobs:
  publish:
    permissions:
      id-token: write
      contents: write
    runs-on: ubuntu-latest
    outputs:
      version: ${{ inputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download build artifacts
        if: ${{ inputs.artifact-pattern != '' }}
        uses: actions/download-artifact@v8
        with:
          pattern: ${{ inputs.artifact-pattern }}
          merge-multiple: true
          path: ${{ inputs.artifact-path }}

      - name: Setup node
        uses: ./.github/actions/setup-node
        with:
          cache-dependency-path: "${{ inputs.lockfile-path != '' && inputs.lockfile-path || format('{0}/yarn.lock', inputs.package-dir) }}"

      - uses: ./.github/actions/setup-release-tools

      - name: Install dependencies
        working-directory: ${{ inputs.install-dir != '' && inputs.install-dir || inputs.package-dir }}
        run: yarn

      - name: Set version
        run: xmtp-release set-manifest-version --sdk "${{ inputs.sdk }}" --version "${{ inputs.version }}"

      - name: Pin binding dependency version
        if: ${{ inputs.dep-name != '' }}
        run: xmtp-release set-dependency-version --sdk "${{ inputs.sdk }}" --dep "${{ inputs.dep-name }}" --version "${{ inputs.dep-version }}"

      - name: Determine NPM tag
        id: npm-tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          # Each prerelease channel gets its own dist-tag so consumers can pin
          # @nightly / @dev / @rc independently. Check nightly first (a nightly
          # string contains neither "dev" nor "rc"). A plain release -> latest.
          if [[ "$VERSION" == *"nightly"* ]]; then
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-dev"* ]]; then
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-rc"* ]]; then
            echo "tag=rc" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Update npm to latest
        run: npm install -g npm@latest

      - name: Publish to NPM
        if: ${{ inputs.dry-run != true }}
        working-directory: ${{ inputs.package-dir }}
        run: npm publish --provenance ${{ inputs.ignore-scripts && '--ignore-scripts' || '' }} --tag ${{ steps.npm-tag.outputs.tag }}

      - name: Tag release
        if: ${{ inputs.dry-run != true }}
        run: xmtp-release tag-release --sdk "${{ inputs.sdk }}" --version "${{ inputs.version }}" --ignore-if-exists
