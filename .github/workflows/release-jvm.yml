name: Release JVM SDK

on:
  workflow_call:
    inputs:
      release-type:
        required: true
        type: string
        description: "dev, rc, or final"
      rc-number:
        required: false
        type: string
        description: "RC number (required for rc releases)"
      ref:
        required: true
        type: string
        description: "Git ref to build from"
    outputs:
      version:
        description: "The published version string"
        value: ${{ jobs.publish.outputs.version }}

jobs:
  build-native:
    strategy:
      fail-fast: true
      matrix:
        include:
          - runner: warp-macos-latest-arm64-6x
            jna-platform: darwin-aarch64
          - runner: warp-ubuntu-latest-x64-16x
            jna-platform: linux-x86-64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ github.token }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build native library (${{ matrix.jna-platform }})
        run: nix build .#jvm-native-fast -L

      - name: Upload native library
        uses: actions/upload-artifact@v7
        with:
          name: jvm-native-${{ matrix.jna-platform }}
          path: result/
          retention-days: 1

  publish:
    needs: [build-native]
    runs-on: warp-ubuntu-latest-x64-16x
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-release-tools
      - uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ github.token }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Compute version
        id: version
        run: |
          if [ "${{ inputs.release-type }}" = "rc" ]; then
            VERSION=$(xmtp-release compute-version --sdk android --release-type rc --rc-number ${{ inputs.rc-number }})
          elif [ "${{ inputs.release-type }}" = "dev" ]; then
            VERSION=$(xmtp-release compute-version --sdk android --release-type dev)
          else
            VERSION=$(xmtp-release compute-version --sdk android --release-type final)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

      - name: Set version in gradle.properties
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: xmtp-release set-manifest-version --sdk android --version "$VERSION"

      - name: Download native libraries
        uses: actions/download-artifact@v8
        with:
          pattern: jvm-native-*
          path: sdks/android/xmtp-native/src/main/resources/
          merge-multiple: true

      - name: Verify native libraries
        run: find sdks/android/xmtp-native/src/main/resources/ -type f | sort

      - name: Build and publish
        working-directory: sdks/android
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          SIGN_KEY: ${{ secrets.OSSRH_GPG_SECRET_KEY }}
          SIGN_PASSWORD: ${{ secrets.OSSRH_GPG_SECRET_KEY_PASSWORD }}
          MAVEN_PROFILE_ID: ${{ secrets.MAVEN_PROFILE_ID }}
        run: |
          nix develop .#android --command ./gradlew \
            :xmtp-native:build \
            :xmtp-native:publishReleasePublicationToSonatypeRepository \
            closeAndReleaseSonatypeStagingRepository
