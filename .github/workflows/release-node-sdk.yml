name: Release Node SDK

on:
  workflow_call:
    inputs:
      release-type:
        required: true
        type: string
        description: "dev, rc, or final"
      rc-number:
        required: false
        type: string
        description: "RC number (required for rc releases)"
      ref:
        required: true
        type: string
        description: "Git ref to build from"
      pending-version:
        required: false
        type: string
      pending-kind:
        required: false
        type: string
      dry-run:
        required: false
        type: boolean
        default: false
    outputs:
      version:
        description: "The published version string"
        value: ${{ jobs.publish.outputs.version }}
      binding-version:
        description: "The @xmtp/node-bindings version published in this run and pinned by the SDK"
        value: ${{ jobs.bindings.outputs.version }}

env:
  CARGO_TERM_COLOR: always

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-release-tools

      - name: Compute version
        id: version
        run: |
          if [ "${{ inputs.release-type }}" = "rc" ]; then
            VERSION=$(xmtp-release compute-version --sdk node-sdk --release-type rc --rc-number ${{ inputs.rc-number }})
          elif [ "${{ inputs.release-type }}" = "dev" ]; then
            if [ -z "${{ inputs.pending-version }}" ] || [ -z "${{ inputs.pending-kind }}" ]; then
              echo "::error::dev resolve called with empty pending version/kind"
              exit 1
            fi
            VERSION=$(xmtp-release resolve-sdk-version \
              --sdk node-sdk --release-type dev \
              --pending-version "${{ inputs.pending-version }}" \
              --pending-kind "${{ inputs.pending-kind }}")
          elif [ "${{ inputs.release-type }}" = "nightly" ]; then
            if [ -z "${{ inputs.pending-version }}" ] || [ -z "${{ inputs.pending-kind }}" ]; then
              echo "::error::nightly resolve called with empty pending version/kind"
              exit 1
            fi
            VERSION=$(xmtp-release resolve-sdk-version \
              --sdk node-sdk --release-type nightly \
              --pending-version "${{ inputs.pending-version }}" \
              --pending-kind "${{ inputs.pending-kind }}")
          else
            VERSION=$(xmtp-release compute-version --sdk node-sdk --release-type final)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

  bindings:
    needs: setup
    uses: ./.github/workflows/release-node.yml
    with:
      release-type: ${{ inputs.release-type }}
      rc-number: ${{ inputs.rc-number }}
      ref: ${{ inputs.ref }}
      pending-version: ${{ inputs.pending-version }}
      pending-kind: ${{ inputs.pending-kind }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit

  build:
    needs: [setup, bindings]
    runs-on: warp-ubuntu-latest-x64-16x
    env:
      NIX_DEVSHELL: js
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - uses: taiki-e/install-action@just

      - name: Stage node bindings
        run: just js bindings

      - name: Install + build node-sdk
        run: |
          nix develop .#js --command bash -euc '
            cd sdks/js && yarn install --immutable
            yarn workspace @xmtp/node-sdk run build'

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: node_sdk_build
          path: sdks/js/node-sdk/dist
          retention-days: 1

  publish:
    needs: [setup, build, bindings]
    uses: ./.github/workflows/npm-publish.yml
    with:
      package-dir: sdks/js/node-sdk
      install-dir: sdks/js
      lockfile-path: sdks/js/yarn.lock
      sdk: node-sdk
      version: ${{ needs.setup.outputs.version }}
      artifact-pattern: node_sdk_build
      artifact-path: sdks/js/node-sdk/dist
      ignore-scripts: true
      dep-name: "@xmtp/node-bindings"
      dep-version: ${{ needs.bindings.outputs.version }}
      dry-run: ${{ inputs.dry-run }}
    secrets: inherit
