name: Release WASM Bindings

on:
  workflow_call:
    inputs:
      release-type:
        required: true
        type: string
        description: "dev, rc, or final"
      rc-number:
        required: false
        type: string
        description: "RC number (required for rc releases)"
      ref:
        required: true
        type: string
        description: "Git ref to build from"
    outputs:
      version:
        description: "The published version string"
        value: ${{ jobs.publish.outputs.version }}

env:
  CARGO_TERM_COLOR: always

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-release-tools

      - name: Compute version
        id: version
        run: |
          if [ "${{ inputs.release-type }}" = "rc" ]; then
            VERSION=$(xmtp-release compute-version --sdk wasm-bindings --release-type rc --rc-number ${{ inputs.rc-number }})
          elif [ "${{ inputs.release-type }}" = "dev" ]; then
            VERSION=$(xmtp-release compute-version --sdk wasm-bindings --release-type dev)
          elif [ "${{ inputs.release-type }}" = "nightly" ]; then
            VERSION=$(xmtp-release compute-version --sdk wasm-bindings --release-type nightly)
          else
            VERSION=$(xmtp-release compute-version --sdk wasm-bindings --release-type final)
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

  build:
    needs: setup
    runs-on: warp-ubuntu-latest-x64-16x
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: ./.github/actions/setup-nix
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build wasm-bindings
        run: nix-fast-build --flake .#packages.x86_64-linux.wasm-bindings

      - name: Upload build output
        uses: actions/upload-artifact@v7
        with:
          name: wasm_build
          path: result-/dist
          retention-days: 1

  publish:
    needs: [setup, build]
    uses: ./.github/workflows/npm-publish.yml
    with:
      package-dir: bindings/wasm
      sdk: wasm-bindings
      version: ${{ needs.setup.outputs.version }}
      artifact-pattern: wasm_build
      artifact-path: bindings/wasm/dist
      ignore-scripts: true
    secrets: inherit
