name: Test Devcontainer

on:
  workflow_call:

permissions:
  contents: read
  packages: write
  pull-requests: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: xmtp/libxmtp-devcontainer

jobs:
  build-push-test:
    name: Build, push, and smoke-test devcontainer image
    runs-on: ubuntu-latest
    # Generous cap: multi-arch build under QEMU + cold flake evaluation
    # inside the launched container (rust toolchains + every devShell dep
    # pulled from xmtp.cachix.org on every run, since the in-container nix
    # store is ephemeral).
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr

      - name: Build and push image (multi-arch)
        id: push
        uses: docker/build-push-action@v7
        with:
          context: ./.devcontainer
          file: ./.devcontainer/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: ./.github/actions/setup-release-tools

      - name: Pin devcontainer.json to the freshly pushed image
        # Rewrite the checked-out devcontainer.json to reference the exact
        # manifest-list digest we just pushed, so `devcontainer up` pulls and
        # exercises the image produced by *this* run — not whatever digest is
        # currently committed on the branch.
        env:
          DEVCONTAINER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: xmtp-release set-devcontainer-image --image "$DEVCONTAINER_IMAGE"

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Launch devcontainer
        # `devcontainer up` pulls the pinned image, starts the container, and
        # runs postCreateCommand (.devcontainer/setup.sh) + postStartCommand
        # (`direnv exec . true`). The postStartCommand triggers `use flake .`
        # via direnv, which forces a full evaluation of the default devShell.
        # A clean exit here already validates that nix is functional, the
        # flake evaluates, and every devShell input resolves.
        run: devcontainer up --workspace-folder .

      - name: nix --version
        run: devcontainer exec --workspace-folder . -- nix --version

      - name: direnv --version
        run: devcontainer exec --workspace-folder . -- direnv --version

      - name: Flake devShell exposes `just`
        run: devcontainer exec --workspace-folder . -- direnv exec . just --version

      - name: Flake devShell exposes `cargo`
        run: devcontainer exec --workspace-folder . -- direnv exec . cargo --version

      - name: Verify committed devcontainer.json is in sync with the built image
        # The earlier "Pin devcontainer.json …" step rewrote the workspace copy
        # to reference the freshly pushed digest. If git shows no diff, the
        # committed file already matches and we're good. If there IS a diff,
        # the author needs to update .devcontainer/devcontainer.json on their
        # branch — we fail the check and leave (or update) a PR comment with a
        # copy-pasteable command.
        if: always() && steps.push.outcome == 'success'
        env:
          FRESH_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          if git diff --quiet -- .devcontainer/devcontainer.json; then
            echo "devcontainer.json is in sync with the built image ✓"
            exit 0
          fi

          echo "::error::devcontainer.json is out of sync with the built image."
          echo "Expected image: $FRESH_IMAGE"
          echo ""
          echo "Diff:"
          git --no-pager diff -- .devcontainer/devcontainer.json

          if [[ -n "${PR_NUMBER:-}" ]]; then
            marker="<!-- devcontainer-image-check -->"
            body="$marker

          The devcontainer image built from this PR does not match the pinned digest in \`.devcontainer/devcontainer.json\`.

          Please update it by running this from the repo root, then commit the change:

          \`\`\`sh
          ( cd dev/release-tools && yarn cli set-devcontainer-image --image '$FRESH_IMAGE' )
          \`\`\`

          CI will re-run on the new commit and this check will pass."

            existing="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
              --jq ".[] | select(.body | contains(\"$marker\")) | .id" | head -n1)"
            if [[ -n "$existing" ]]; then
              gh api --method PATCH \
                "repos/${GITHUB_REPOSITORY}/issues/comments/$existing" \
                -f body="$body" >/dev/null
              echo "Updated existing PR comment $existing"
            else
              gh pr comment "$PR_NUMBER" --body "$body"
              echo "Posted new PR comment"
            fi
          fi

          exit 1
