name: Build and Publish Client Monitor

on:
  push:
    branches:
      - main
    paths:
      - 'apps/xmtp_debug/**'
      - 'crates/xmtp_api/**'
      - 'crates/xmtp_mls/**'
      - 'crates/xmtp_db/**'
      - 'crates/xmtp_id/**'
      - 'crates/xmtp_cryptography/**'
      - 'crates/xmtp_proto/**'
      - 'crates/xmtp_api_grpc/**'
      - 'crates/xmtp_api_d14n/**'
      - 'crates/xmtp_configuration/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: xmtp/d14n-client-monitor

jobs:
  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: './apps/xmtp_debug/client-monitor'
          severity: warning

  build:
    name: Build and push client monitor image
    runs-on: ubuntu-latest
    needs: shellcheck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Capture commit metadata
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.short_sha }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/xmtp_debug/client-monitor/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
