name: "Setup Nix"
description: "Install Nix with Cachix caching for XMTP"
inputs:
  github-token:
    description: "GitHub token for Nix installation"
    required: true
  cachix-auth-token:
    description: "Cachix auth token for xmtp cache"
    required: false
  sccache:
    description: "Enable sccache with GitHub Actions cache backend"
    required: false
    default: "false"
  with-warpbuild-cache:
    description: "whether to enable the warpbuild nix cache"
    required: false
    default: "true"
  gc-max-store-size:
    description: "Max Nix store size before garbage collection (e.g. 5G, 10G). Only applies on WarpBuild runners."
    required: false
    default: "20G"
runs:
  using: "composite"
  steps:
    - uses: cachix/install-nix-action@v31
      with:
        # https://github.com/nixos/nix/issues/15619 2.34.4 causes pach failures
        install_url: https://releases.nixos.org/nix/nix-2.31.2/install
        github_access_token: ${{ inputs.github-token }}
        extra_nix_config: |
          accept-flake-config = true
    - uses: ./.github/actions/setup-nix-cache
      if: ${{ inputs.with-warpbuild-cache == 'true' }}
      with:
        gc-max-store-size: ${{ inputs.gc-max-store-size }}
    - uses: cachix/cachix-action@v17
      if: ${{ inputs.cachix-auth-token != '' }}
      with:
        name: xmtp
        authToken: ${{ inputs.cachix-auth-token }}
    - uses: cachix/cachix-action@v17
      if: ${{ inputs.cachix-auth-token == '' }}
      with:
        name: xmtp
    - name: Setup sccache
      if: ${{ inputs.sccache == 'true' }}
      uses: mozilla-actions/sccache-action@v0.0.9
    - name: Install nix-fast-build
      run: nix profile add github:Mic92/nix-fast-build
      shell: bash
    - name: Configure sccache env
      if: ${{ inputs.sccache == 'true' }}
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
        echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
      shell: bash
