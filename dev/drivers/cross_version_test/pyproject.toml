[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "cross-version-test"
version = "0.1.0"
description = "Drive multiple xdbg builds against a shared XVT_DB_ROOT to detect cross-version MLS regressions"
requires-python = ">=3.13"
dependencies = ["xdbg-driver-lib"]

[project.scripts]
cross-version-test = "cross_version_test.__main__:main"

[tool.setuptools.packages.find]
include = ["cross_version_test*"]
