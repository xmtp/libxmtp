[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "xdbg-driver-lib"
version = "0.1.0"
description = "Shared driver helpers for cross-version-test and cross-talk-test"
requires-python = ">=3.13"
dependencies = ["GitPython>=3.1", "packaging>=24", "rich>=13"]

[tool.setuptools.packages.find]
include = ["xdbg_driver_lib_py*"]
